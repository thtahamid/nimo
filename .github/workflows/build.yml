name: build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          fi
          xcodebuild -version

      - name: Bootstrap CI tools (xcodegen, create-dmg)
        run: bash macos/scripts/ci-bootstrap.sh

      - name: Build dylib
        run: make -C macos/dylib

      - name: Test dylib
        run: make -C macos/dylib test

      - name: Generate Xcode project
        run: cd macos/installer && xcodegen generate

      - name: Run Swift tests
        run: |
          xcodebuild test \
            -project macos/installer/NimoInstaller.xcodeproj \
            -scheme Nimo \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release
        run: bash macos/scripts/build.sh --configuration Release

      - name: Create DMG
        run: bash macos/scripts/create-dmg.sh "${GITHUB_SHA::7}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nimo-${{ github.sha }}-dmg
          path: |
            build/dmg/*.dmg
            build/dmg/*.sha256
          if-no-files-found: error
