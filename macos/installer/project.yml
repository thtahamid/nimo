name: NimoInstaller

options:
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.nimo.installer
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    ARCHS: "arm64 x86_64"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
  configs:
    Release:
      ONLY_ACTIVE_ARCH: NO
    Debug:
      ONLY_ACTIVE_ARCH: YES

targets:
  Nimo:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Resources/**"
    resources:
      - path: Sources/Resources/Assets.xcassets
      - path: Sources/Resources/launcher.sh
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/NimoInstaller.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.nimo.installer
        PRODUCT_NAME: Nimo
    preBuildScripts:
      - name: Copy nimo.dylib into app Resources
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          DYLIB="$SRCROOT/../dylib/build/nimo.dylib"
          if [ ! -f "$DYLIB" ]; then
            echo "error: nimo.dylib not found at $DYLIB -- run 'make -C ../dylib' first" >&2
            exit 1
          fi
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$DYLIB" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/nimo.dylib"

  NimoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Nimo
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nimo.app/Contents/MacOS/Nimo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Nimo:
    build:
      targets:
        Nimo: all
        NimoTests: [test]
    test:
      targets:
        - NimoTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
